name: PokeWonder Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests playwright
          playwright install chromium

      - name: Run monitor
        run: python check_stock.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Save state
        run: |
          git config user.name "pokewonder-monitor"
          git config user.email "pokewonder-monitor@users.noreply.github.com"
          git add state.json || true
          git commit -m "Update state" || true
          git push || true